<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <script src="../js/script.js" defer></script>

  <body class="quizBody">
    <div class="navContainer">
      <img src="../img/Bleikerquizzen.png" alt="Logo" id="navLogo" />
      <nav>
        <ul>
          <li><a href="../index.html">Hjem</a></li>

    <h1 id="quizH1">BleikerQuizzen</h1>

    <div class="mainquiz">
      <div id="quizQuestion"></div>

      <div class="quizOptions">
        <div class="option"></div>
        <div class="option"></div>
        <div class="option"></div>
        <div class="option"></div>
      </div>

      <button id="nextButton">Neste</button>
      <div
        id="leaderboardContainer"
        style="display: none; margin-top: 30px; text-align: center"

          <p>Skriv inn ditt navn for leaderboard:</p>
          <input type="text" id="playerName" placeholder="Ditt navn" />
          <button id="submitName">Send inn</button>
        </div>
        <div id="highscores" style="display: none; margin-top: 20px">
          <h3>Highscore</h3>
          <ol
            id="highscoreList"
            style="list-style-position: inside; padding-left: 0"
          ></ol>
        </div>
      </div>
    </div>

    <footer>
      <img src="../img/Bleikerquizzen.png" alt="Logo" id="footerLogo" />
